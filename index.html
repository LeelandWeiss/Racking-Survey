<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Racking Survey</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'IBM Plex Mono', monospace;
  background:#1a1a1a;
  color:#e0ddd5;
}
.app { max-width:600px; margin:auto; padding-bottom:70px; }
.topBar { background:#c62828; padding:14px; position:sticky; top:0; }
.topTitle { font-family:'Oswald'; color:#fff; font-weight:700; }
.section { margin-top:15px; border-bottom:1px solid #333; padding-bottom:5px; }
input, textarea {
  width:100%; margin-top:6px; padding:10px;
  background:#252525; color:#fff; border:1px solid #444;
}
button {
  margin-top:10px; padding:12px; width:100%;
  background:#c62828; border:none; color:#fff; cursor:pointer;
}
.card { background:#222; padding:10px; margin-top:10px; }
.nav {
  position:fixed; bottom:0; left:0; right:0;
  display:flex; max-width:600px; margin:auto;
}
.nav button { flex:1; background:#111; }
img { width:60px; height:60px; object-fit:cover; margin:2px; }
</style>
</head>

<body>
<div class="app">
<div class="topBar"><div class="topTitle">Racking Survey</div></div>

<div id="content"></div>

<div class="nav">
<button onclick="setView('header')">Store</button>
<button onclick="setView('add')">Add</button>
<button onclick="setView('review')">Review</button>
<button onclick="setView('export')">Export</button>
</div>
</div>

<script>
let survey = JSON.parse(localStorage.getItem("survey")) || {
  storeNumber:"",
  storeName:"",
  surveyDate:new Date().toISOString().split("T")[0],
  surveyorName:"",
  findings:[],
  notes:""
};

let current = {};
let view = "header";
let editIndex = null;

function save() {
  localStorage.setItem("survey", JSON.stringify(survey));
}

function setView(v){
  view = v;
  render();
}

function render(){
  const el = document.getElementById("content");

  if(view==="header"){
    el.innerHTML = `
      <div class="section">Survey Info</div>
      <input placeholder="Store #" value="${survey.storeNumber}" onchange="survey.storeNumber=this.value;save()">
      <input placeholder="Store Name" value="${survey.storeName}" onchange="survey.storeName=this.value;save()">
      <input type="date" value="${survey.surveyDate}" onchange="survey.surveyDate=this.value;save()">
      <input placeholder="Your Name" value="${survey.surveyorName}" onchange="survey.surveyorName=this.value;save()">
      <textarea placeholder="Notes" onchange="survey.notes=this.value;save()">${survey.notes}</textarea>
      <button onclick="setView('add')">Start</button>
    `;
  }

  if(view==="add"){
    el.innerHTML = `
      <div class="section">Add Item</div>
      <input id="type" placeholder="Racking Type">
      <input id="part" placeholder="Part Type">
      <input id="dim" placeholder="Dimensions">
      <input id="loc" placeholder="Location">
      <input id="qty" placeholder="Quantity">
      <textarea id="desc" placeholder="Description"></textarea>
      <input type="file" multiple onchange="addPhotos(event)">
      <div id="photos"></div>
      <button onclick="saveItem()">Save Item</button>
    `;
  }

  if(view==="review"){
    el.innerHTML = `<div class="section">Items (${survey.findings.length})</div>`;
    survey.findings.forEach((f,i)=>{
      el.innerHTML += `
        <div class="card">
          <b>#${i+1} ${f.type}</b><br>
          ${f.part||""}<br>
          ${f.dim||""}<br>
          ${f.loc||""}<br>
          Qty: ${f.qty||""}<br>
          ${f.desc||""}<br>
          ${(f.photos||[]).map(p=>`<img src="${p}">`).join("")}
          <button onclick="deleteItem(${i})">Delete</button>
        </div>
      `;
    });
    el.innerHTML += `<button onclick="setView('add')">+ Add Item</button>`;
  }

  if(view==="export"){
    let text = `STORE ${survey.storeNumber} - ${survey.storeName}\n`;
    text += `Surveyor: ${survey.surveyorName}\n\n`;

    survey.findings.forEach((f,i)=>{
      text += `#${i+1} ${f.type}\n`;
      text += `${f.part}\n${f.dim}\n${f.loc}\nQty:${f.qty}\n${f.desc}\n\n`;
    });

    el.innerHTML = `
      <div class="section">Export</div>
      <button onclick="copyText()">Copy Report</button>
      <pre>${text}</pre>
    `;
  }
}

function saveItem(){
  const item = {
    type:type.value,
    part:part.value,
    dim:dim.value,
    loc:loc.value,
    qty:qty.value,
    desc:desc.value,
    photos: current.photos || []
  };

  survey.findings.push(item);
  current = {};
  save();
  setView("review");
}

function deleteItem(i){
  if(confirm("Delete item?")){
    survey.findings.splice(i,1);
    save();
    render();
  }
}

function addPhotos(e){
  current.photos = current.photos || [];
  Array.from(e.target.files).forEach(file=>{
    const r = new FileReader();
    r.onload = ev=>{
      current.photos.push(ev.target.result);
      renderPhotos();
    };
    r.readAsDataURL(file);
  });
}

function renderPhotos(){
  const p = document.getElementById("photos");
  if(!p) return;
  p.innerHTML = (current.photos||[]).map(src=>`<img src="${src}">`).join("");
}

function copyText(){
  const pre = document.querySelector("pre").innerText;
  navigator.clipboard.writeText(pre);
  alert("Copied!");
}

render();
</script>

</body>
</html>
