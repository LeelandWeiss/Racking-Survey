<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Racking Survey</title>

  <!-- PWA META -->
  <meta name="theme-color" content="#c62828"/>

  <style>
    body {
      margin:0;
      font-family: monospace;
      background:#1a1a1a;
      color:#e0ddd5;
      padding:16px;
    }
    input, textarea, button {
      width:100%;
      margin-top:8px;
      padding:12px;
      background:#252525;
      color:#fff;
      border:1px solid #444;
      border-radius:4px;
    }
    button {
      background:#c62828;
      font-weight:bold;
      cursor:pointer;
    }
    .card {
      background:#222;
      padding:12px;
      margin-top:12px;
      border-radius:6px;
    }
  </style>
</head>

<body>

<h2>Racking Survey</h2>

<input id="store" placeholder="Store #" />
<input id="name" placeholder="Store Name" />
<input id="user" placeholder="Your Name" />

<h3>Add Item</h3>

<input id="type" placeholder="Racking Type" />
<input id="part" placeholder="Part Type" />
<input id="qty" type="number" placeholder="Quantity" />
<textarea id="desc" placeholder="Notes"></textarea>

<button onclick="addItem()">Add Item</button>

<h3>Items</h3>
<div id="list"></div>

<button onclick="exportData()">Copy Report</button>

<script>
// DATA
let survey = JSON.parse(localStorage.getItem("survey")) || {
  store:"",
  name:"",
  user:"",
  items:[]
};

// SAVE
function save() {
  localStorage.setItem("survey", JSON.stringify(survey));
}

// ADD ITEM
function addItem() {
  const item = {
    type: type.value,
    part: part.value,
    qty: qty.value,
    desc: desc.value
  };

  survey.store = store.value;
  survey.name = name.value;
  survey.user = user.value;

  survey.items.push(item);

  type.value = part.value = qty.value = desc.value = "";

  save();
  render();
}

// RENDER
function render() {
  list.innerHTML = "";
  survey.items.forEach((i, idx) => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <b>#${idx+1} ${i.type}</b><br/>
      ${i.part || ""}<br/>
      Qty: ${i.qty || ""}<br/>
      ${i.desc || ""}
    `;
    list.appendChild(div);
  });
}

// EXPORT
function exportData() {
  let text = `STORE ${survey.store} - ${survey.name}\n`;
  text += `Surveyor: ${survey.user}\n\n`;

  survey.items.forEach((i, idx) => {
    text += `#${idx+1} ${i.type}\n`;
    text += `Part: ${i.part}\nQty: ${i.qty}\n${i.desc}\n\n`;
  });

  navigator.clipboard.writeText(text);
  alert("Copied!");
}

// INIT
store.value = survey.store;
name.value = survey.name;
user.value = survey.user;
render();

// SERVICE WORKER (INLINE)
if ('serviceWorker' in navigator) {
  const swCode = `
    const cacheName = 'app-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(cacheName).then(cache => cache.add('/')));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(res => res || fetch(e.request))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'text/javascript' });
  const swURL = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swURL);
}
</script>

</body>
</html>
